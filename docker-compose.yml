version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: order-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: order-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/order_dashboard
      - SECRET_KEY=supersecretkeychangeinproduction
      - EXCHANGE_RATE_API_URL=https://open.er-api.com/v6/latest/USD
      - BACKEND_CORS_ORIGINS=["*"]
    ports:
      - "8000:8000"
    depends_on:
      - db
    # Apply database migrations first, then run FastAPI server
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: order-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
